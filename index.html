<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <style>
    :root{
      --bg0:#0b1220;
      --bg1:#070a12;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --accent:#2ea44f; /* TimmyHub-ish green */
      --accent2:#1f7a3a;
      --focus:#58a6ff; /* TimmyHub-ish blue */
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(1000px 500px at 50% -120px, rgba(88,166,255,0.25), transparent 60%),
        radial-gradient(800px 420px at 20% 10%, rgba(46,164,79,0.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    /* ASCII starfield background */
    #stars{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.15));
      z-index:0;
    }
    .star{
      position:absolute;
      top:0; left:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      will-change: transform, opacity;
      user-select:none;
      opacity: 0.9;
    }

    /* ASCII ink that appears where the mouse moves */
    #mouseInk{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:2;
    }
    .inkChar{
      position:absolute;
      transform: translate(-50%, -50%);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      opacity: 0;
      animation: inkFade 900ms ease-out forwards;
      user-select:none;
      white-space:pre;
      text-shadow: 0 0 6px rgba(88,166,255,0.15);
    }
    @keyframes inkFade{
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.98); }
      10%  { opacity: 1; transform: translate(-50%, -50%) scale(1.00); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06); }
    }

    .wrap{
      position:relative;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:28px 14px;
      overflow:auto;
      z-index:1;
    }

    .stack{
      width:min(420px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    /* Account panel (shown after login) */
    .panel{
      width:min(1020px, 100%);
      padding:16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow:
        0 20px 70px rgba(0,0,0,0.42),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .panelSectionTitle{
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin: 4px 0 10px;
    }
    .panelInfoGrid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .panelCard{
      padding: 12px 12px 10px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      min-height: 62px;
    }
    .panelLabel{
      font-size: 11.5px;
      color: rgba(255,255,255,0.58);
      margin-bottom: 4px;
      user-select:none;
    }
    .panelValue{
      font-size: 13.5px;
      color: rgba(255,255,255,0.9);
      font-weight: 650;
      word-break: break-word;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: 0.01em;
    }

    .panelActionsGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .panelActionCard{
      padding: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      min-height: 138px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }
    .panelActionTitle{
      font-weight: 900;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.92);
    }
    .panelActionText{
      font-size: 12.5px;
      color: rgba(255,255,255,0.62);
      line-height: 1.35;
      flex: 1;
    }
    .actionBtn{
      height: 38px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.35);
      background: linear-gradient(180deg, #7b5cff, #5a3cff);
      color: #fff;
      font-weight: 850;
      cursor:pointer;
      transition: transform 80ms ease, filter 120ms ease;
      box-shadow: 0 16px 26px rgba(93,60,255,0.20);
    }
    .actionBtn:hover{ filter: brightness(1.03); }
    .actionBtn:active{ transform: translateY(1px); }

    .changelogCard{
      padding: 14px;
      background: rgba(0,0,0,0.16);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
    }
    .changelogPre{
      margin:0;
      color: rgba(255,255,255,0.68);
      font-size: 12.5px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .btnGhost{
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.8);
      font-weight: 750;
      cursor:pointer;
      width: 100%;
      max-width: 300px;
      transition: filter 120ms ease;
    }
    .btnGhost:hover{ filter: brightness(1.07); }

    @media (max-width: 920px){
      .panelInfoGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panelActionsGrid{ grid-template-columns: 1fr; }
    }

    .brand{
      width:66px; height:66px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:2px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
    }
    .brand svg{ display:block; }

    .card{
      width:100%;
      padding:20px 18px 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .title{
      text-align:center;
      font-size: 20px;
      font-weight: 700;
      margin:2px 0 14px;
      letter-spacing: -0.01em;
    }

    .field{ margin: 12px 0; }
    label{
      display:block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 6px;
    }
    .control{
      width:100%;
      height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      outline:none;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }
    .control::placeholder{ color: rgba(255,255,255,0.35); }
    .control:focus{
      border-color: rgba(88,166,255,0.9);
      box-shadow: 0 0 0 4px rgba(88,166,255,0.18);
      background: rgba(0,0,0,0.35);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top: 2px;
      margin-bottom: 6px;
    }
    .link{
      font-size: 13px;
      color: rgba(88,166,255,0.95);
      text-decoration:none;
    }
    .link:hover{ text-decoration:underline; }

    .btn{
      width:100%;
      height:42px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.3);
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor:pointer;
      margin-top: 6px;
      box-shadow: 0 10px 20px rgba(46,164,79,0.15);
      transition: transform 80ms ease, filter 120ms ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ filter: brightness(1.02); }

    .divider-card{
      width:100%;
      padding:16px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      text-align:center;
      color: var(--muted);
    }
    .passkey{
      font-weight: 700;
      color: rgba(88,166,255,0.98);
      margin-bottom: 2px;
    }

    .footer-links{
      margin-top: 4px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.55);
      display:flex;
      justify-content:center;
      gap: 18px;
      flex-wrap: wrap;
      user-select:none;
    }
    .footer-links a{
      color: rgba(255,255,255,0.6);
      text-decoration:none;
    }
    .footer-links a:hover{ text-decoration:underline; }

    @media (max-width: 420px){
      .card{ padding-left: 14px; padding-right: 14px; }
      .divider-card{ padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>
  <div id="stars" aria-hidden="true"></div>
  <div id="mouseInk" aria-hidden="true"></div>

  <div class="wrap">
    <div class="stack" id="loginSection">
      <div class="brand" aria-hidden="true">
        <!-- Simple TimmyHub-ish mark -->
        <svg width="30" height="30" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 0.5C3.58 0.5 0 4.12 0 8.58C0 12.14 2.29 15.15 5.47 16C5.87 16.07 6.03 15.82 6.03 15.61C6.03 15.41 6.02 14.85 6.01 14.52C4.06 14.95 3.64 13.98 3.48 13.6C3.37 13.33 3.01 12.59 2.66 12.4C2.36 12.24 1.98 11.86 2.65 11.85C3.28 11.84 3.73 12.44 3.88 12.73C4.58 14.01 5.76 13.65 6.23 13.45C6.3 12.9 6.5 12.52 6.75 12.3C4.98 12.1 3.16 11.44 3.16 8.58C3.16 7.74 3.46 7.05 3.95 6.54C3.86 6.33 3.58 5.53 4.03 4.46C4.03 4.46 4.68 4.25 6.01 5.26C6.58 5.1 7.18 5.02 7.79 5.02C8.4 5.02 9 5.1 9.57 5.26C10.9 4.25 11.55 4.46 11.55 4.46C12 5.53 11.72 6.33 11.63 6.54C12.12 7.05 12.42 7.74 12.42 8.58C12.42 11.45 10.59 12.1 8.82 12.3C9.13 12.56 9.4 13.08 9.4 13.86C9.4 14.98 9.39 15.62 9.39 15.61C9.39 15.82 9.55 16.07 9.95 16C13.13 15.15 15.42 12.14 15.42 8.58C15.42 4.12 11.84 0.5 8 0.5Z" fill="rgba(255,255,255,0.92)"/>
        </svg>
      </div>

      <div class="card" role="region" aria-label="Login form">
        <div class="title">Sign in to Complexity</div>

        <form id="loginForm" autocomplete="on">
          <div id="loginError" style="display:none; margin: 0 0 10px; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.28); color: rgba(255,255,255,0.86); font-size: 13px; line-height: 1.35;"></div>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" class="control" type="text" placeholder="" required />
          </div>

          <div class="field">
            <div class="row">
              <label for="password" style="margin:0;">Password</label>
              <a class="link" href="#" onclick="event.preventDefault(); alert('Forgot password flow not wired.');">Forgot password?</a>
            </div>
            <input id="password" name="password" class="control" type="password" required />
          </div>

          <button class="btn" type="submit">Sign in</button>
        </form>
      </div>

      <div class="divider-card" role="region" aria-label="Secondary sign-in">
        <div class="passkey">Sign in with a passkey</div>
        <div>
          New to Complexity?
          <a class="link" href="#" onclick="event.preventDefault(); alert('Create account flow not wired.');">
            Create an account
          </a>
        </div>
      </div>

      <div class="footer-links" aria-hidden="true">
        <a href="#" onclick="event.preventDefault();"></a>
        <a href="#" onclick="event.preventDefault();"></a>
        <a href="#" onclick="event.preventDefault();">Docs</a>
        <a href="#" onclick="event.preventDefault();">Join the Discord</a>
        <a href="#" onclick="event.preventDefault();"></a>
        <a href="#" onclick="event.preventDefault();">TOS</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const container = document.getElementById('stars');
      const mouseInk = document.getElementById('mouseInk');
      // GitHub raw text file containing credentials:
      // format: `username:password` per line
      const LOGINS_URLS = [
        'https://raw.githubusercontent.com/aydakarrr/test/refs/heads/main/logins.txt'
      ];
      const loginError = document.getElementById('loginError');
      const chars = ['.', '*', '+', 'o', 'x'];
      const state = [];
      let rafId = 0;

      function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

      function resizeAndRebuild(){
        container.innerHTML = '';
        state.length = 0;

        const w = window.innerWidth;
        const h = window.innerHeight;

        // Density scales with area; keep it in a nice readable range.
        const count = clamp(Math.floor((w * h) / 12000), 90, 260);

        for (let i = 0; i < count; i++) {
          const el = document.createElement('span');
          el.className = 'star';

          const ch = chars[(Math.random() * chars.length) | 0];
          el.textContent = ch;

          const x = Math.random() * w;
          const y = Math.random() * h;
          const size = 11 + Math.random() * 10; // px
          const speed = 0.25 + Math.random() * 0.85; // px per tick
          const drift = -0.25 + Math.random() * 0.5; // px per tick
          const alpha = 0.35 + Math.random() * 0.6;

          el.style.fontSize = size + 'px';
          el.style.opacity = alpha.toFixed(2);

          container.appendChild(el);
          state.push({ el, x, y, speed, drift, w, h });
        }
      }

      function tick(){
        const w = window.innerWidth;
        const h = window.innerHeight;
        for (let i = 0; i < state.length; i++){
          const s = state[i];
          s.y += s.speed;
          s.x += s.drift;

          // Wrap around for continuous motion.
          if (s.y > h + 10) { s.y = -10; }
          if (s.x < -10) { s.x = w + 10; }
          if (s.x > w + 10) { s.x = -10; }

          s.el.style.transform = 'translate(' + s.x.toFixed(1) + 'px,' + s.y.toFixed(1) + 'px)';
        }
        rafId = requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => {
        cancelAnimationFrame(rafId);
        resizeAndRebuild();
        rafId = requestAnimationFrame(tick);
      });

      // Start
      resizeAndRebuild();
      rafId = requestAnimationFrame(tick);

      // Mouse "ink" effect: render ASCII line characters along cursor movement.
      const inkChars = ['-', '=', '~', '_', '.', ':'];
      const inkState = { active: false, lastX: 0, lastY: 0, lastT: 0 };
      let inkBudget = 0;

      function spawnInkChar(x, y, jitter){
        const el = document.createElement('span');
        el.className = 'inkChar';

        const ch = inkChars[(Math.random() * inkChars.length) | 0];
        el.textContent = ch;

        const size = 10 + Math.random() * 6; // px
        el.style.fontSize = size + 'px';
        el.style.left = (x + (Math.random() - 0.5) * jitter) + 'px';
        el.style.top = (y + (Math.random() - 0.5) * jitter) + 'px';
        el.style.color = `rgba(255,255,255,${(0.45 + Math.random() * 0.5).toFixed(2)})`;

        mouseInk.appendChild(el);
        // Remove after animation to keep DOM light.
        setTimeout(() => { el.remove(); }, 980);
      }

      function onMouseMove(e){
        inkState.active = true;
        const x = e.clientX;
        const y = e.clientY;
        const now = performance.now();

        if (!inkState.lastT){
          inkState.lastX = x;
          inkState.lastY = y;
          inkState.lastT = now;
          return;
        }

        const dx = x - inkState.lastX;
        const dy = y - inkState.lastY;
        const dist = Math.hypot(dx, dy);

        // Spawn rate limiter so it stays responsive.
        inkBudget += dist;
        const maxBudget = 220; // px worth of spawning per move
        inkBudget = Math.min(inkBudget, maxBudget);

        const step = 9; // px between spawned chars
        const count = Math.min(30, Math.floor(inkBudget / step));

        const ang = Math.atan2(dy, dx);
        const jitter = 6 + Math.random() * 8;

        for (let i = 0; i < count; i++){
          const t = (i + 1) / (count + 1);
          const px = inkState.lastX + dx * t;
          const py = inkState.lastY + dy * t;

          // Slightly bias chars to the movement direction to look like a "line".
          const ox = Math.cos(ang) * (Math.random() - 0.5) * 5;
          const oy = Math.sin(ang) * (Math.random() - 0.5) * 5;
          spawnInkChar(px + ox, py + oy, jitter);
        }

        inkBudget = Math.max(0, inkBudget - count * step);
        inkState.lastX = x;
        inkState.lastY = y;
        inkState.lastT = now;
      }

      window.addEventListener('mousemove', onMouseMove, { passive: true });

      // Load + cache username/password pairs from the GitHub-hosted text file.
      // File format expected: one entry per line: `username:password`
      // Separator lines like `____` and empty lines are ignored.
      let cachedLogins = null;

      async function loadLogins(){
        if (cachedLogins) return cachedLogins;

        let lastUrl = '';
        let lastErr = null;

        for (let i = 0; i < LOGINS_URLS.length; i++){
          const url = LOGINS_URLS[i];
          try{
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) {
              lastUrl = url;
              const statusText = res.statusText ? (' ' + res.statusText) : '';
              lastErr = new Error('HTTP ' + res.status + statusText);
              continue;
            }

            const txt = await res.text();
            const map = new Map();

            txt.split(/\r?\n/).forEach((rawLine) => {
              const line = rawLine.trim();
              if (!line) return;
              if (line.startsWith('____')) return;
              const idx = line.indexOf(':');
              if (idx <= 0) return;

              const username = line.slice(0, idx).trim();
              const password = line.slice(idx + 1).trim();
              if (!username) return;
              map.set(username, password);
            });

            cachedLogins = map;
            return cachedLogins;
          } catch (err){
            lastUrl = url;
            lastErr = err;
          }
        }

        const msg = lastErr && lastErr.message ? lastErr.message : 'Unknown error';
        throw new Error('Failed to load logins file from all URLs. Last URL: ' + lastUrl + ' | ' + msg);
      }

      // Demo behavior for the UI.
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const form = e.currentTarget;
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = form.querySelector('button[type="submit"]');

        loginError.style.display = 'none';
        loginError.textContent = '';

        if (!username || !password) {
          alert('Please enter a username and password.');
          return;
        }

        (async () => {
          try {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            const logins = await loadLogins();
            const expected = logins.get(username);

            if (expected != null && expected === password) {
              // Store mock account details for the panel page.
              const h = hashStr(username);
              const uid = (h % 900000) + 10000;
              const cooldown = (h % 2 === 0) ? 'Reset available' : 'Cooldown active';
              const key = makeKey(username);

              sessionStorage.setItem('timmyhub_username', username);
              sessionStorage.setItem('timmyhub_uid', String(uid));
              sessionStorage.setItem('timmyhub_key', key);
              sessionStorage.setItem('timmyhub_cooldown', cooldown);

              window.location.href = 'panel.html';
            } else {
              loginError.textContent = 'Invalid username or password.';
              loginError.style.display = 'block';
            }
          } catch (err) {
            const msg = (err && err.message) ? err.message : 'Unknown error';
            loginError.textContent = 'Could not sign in: ' + msg;
            loginError.style.display = 'block';
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          }
        })();
      });

      function hashStr(s){
        let h = 2166136261;
        for (let i = 0; i < s.length; i++){
          h ^= s.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return h >>> 0;
      }

      function makeKey(username){
        const h = hashStr(username).toString(16).toUpperCase().padStart(12, '0');
        const a = h.slice(0, 4);
        const b = h.slice(4, 8);
        const c = h.slice(8, 12);
        // Add a couple of A-F-ish letters for a nicer "key" look.
        const x = (a + 'X').slice(0, 4);
        const y = (b + '9').slice(0, 4);
        const z = (c + 'Q').slice(0, 4);
        return '7' + x + '-' + y + '-' + z;
      }
    })();
  </script>
</body>
</html>
